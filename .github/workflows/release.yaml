name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: './src/GDMirage.Server'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Windows
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --output ./build/windows \
            /p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Publish Linux
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output ./build/linux \
            /p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Archive Builds
        run: |
          zip -r ${{ github.workspace }}/gdmirage-server-windows-v${{ steps.gitversion.outputs.semVer }}.zip ./build/windows/
          tar -czf ${{ github.workspace }}/gdmirage-server-linux-v${{ steps.gitversion.outputs.semVer }}.tar.gz -C ./build/linux .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.gitversion.outputs.semVer }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ github.workspace }}/gdmirage-server-windows-v${{ steps.gitversion.outputs.semVer }}.zip
            ${{ github.workspace }}/gdmirage-server-linux-v${{ steps.gitversion.outputs.semVer }}.tar.gz